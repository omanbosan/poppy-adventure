<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ポッピーアドベンチャー</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;background:#0a0018;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;font-family:Georgia,serif;
  -webkit-user-select:none;user-select:none;
}
#wrap{display:flex;flex-direction:column;align-items:center;width:100%;max-width:800px;}
#ui{
  width:100%;display:flex;justify-content:space-between;align-items:center;
  padding:4px 10px;background:rgba(0,0,0,0.65);
  color:#fff;font-size:12px;font-weight:bold;text-shadow:1px 1px 0 #000;
  border-radius:8px 8px 0 0;gap:4px;flex-wrap:wrap;
}
.ui-block{display:flex;align-items:center;gap:3px;white-space:nowrap;}
#coinUI{color:#FFD600;}
#coinUI.warn{color:#ff4444;animation:pulse 0.5s infinite alternate;}
#coinUI.ok{color:#44ff88;}
@keyframes pulse{from{opacity:1;}to{opacity:0.4;}}
.stDot{width:9px;height:9px;border-radius:50%;background:#333;border:1px solid #666;transition:all 0.3s;}
.stDot.done{background:#f5a623;}.stDot.cur{background:#fff;box-shadow:0 0 5px #fff;}
#gameCanvas{display:block;width:100%;height:auto;border:3px solid #f5a623;border-top:none;}
#pad{
  width:100%;display:flex;justify-content:space-between;align-items:center;
  padding:7px 14px 11px;background:rgba(0,0,0,0.72);border-radius:0 0 8px 8px;
}
.dpad{display:flex;gap:8px;}.rpad{display:flex;gap:8px;align-items:center;}
.btn-t{
  width:63px;height:63px;border-radius:50%;
  border:3px solid rgba(255,255,255,0.28);background:rgba(255,255,255,0.1);
  color:#fff;font-size:21px;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;flex-shrink:0;
}
.btn-t small{font-size:8px;line-height:1;}
.btn-t.active{background:rgba(245,166,35,0.55);border-color:#f5a623;}
#jumpBtn{width:69px;height:69px;background:rgba(245,166,35,0.2);border-color:#f5a623;}
#fireBtn{background:rgba(200,40,0,0.2);border-color:#ff4400;opacity:0.35;}
#fireBtn.ready{opacity:1;background:rgba(220,50,0,0.3);border-color:#ff6600;}
#fireBtn.active{background:rgba(255,80,0,0.65);}
#overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:11px;
  background:rgba(6,1,20,0.94);color:#fff;text-align:center;padding:18px;z-index:200;
}
#overlay.hidden{display:none;}
#overlay h1{font-size:26px;color:#f5a623;text-shadow:3px 3px 0 #000;line-height:1.2;}
#overlay p{font-size:13px;line-height:1.8;max-width:310px;}
.ovl-btn{
  padding:12px 32px;background:#f5a623;color:#1a0a2e;
  font-size:18px;font-weight:bold;border:none;border-radius:10px;
  cursor:pointer;box-shadow:0 5px 0 #a06000;touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.ovl-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #a06000;}
#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:150;transition:opacity 0.2s;}
#msgPop{
  position:absolute;top:18px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.78);color:#FFD600;font-size:16px;font-weight:bold;
  padding:5px 16px;border-radius:18px;opacity:0;transition:opacity 0.3s;
  pointer-events:none;white-space:nowrap;z-index:120;
}

const inp={left:false,right:false,jump:false,fire:false};
let jumpEdge=false;
document.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')inp.left=true;
  if(e.code==='ArrowRight'||e.code==='KeyD')inp.right=true;
  if((e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')&&!inp.jump){inp.jump=true;jumpEdge=true;}
  if(e.code==='KeyZ'||e.code==='KeyF')inp.fire=true;
});
document.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA')inp.left=false;
  if(e.code==='ArrowRight'||e.code==='KeyD')inp.right=false;
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')inp.jump=false;
  if(e.code==='KeyZ'||e.code==='KeyF')inp.fire=false;
});
function bindBtn(id,flag,edge){
  const el=document.getElementById(id);
  function on(e){e.preventDefault();e.stopPropagation();inp[flag]=true;if(edge)jumpEdge=true;el.classList.add('active');}
  function off(e){e.preventDefault();e.stopPropagation();inp[flag]=false;el.classList.remove('active');}
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on);el.addEventListener('mouseup',off);el.addEventListener('mouseleave',off);
}
bindBtn('leftBtn','left');bindBtn('rightBtn','right');bindBtn('jumpBtn','jump',true);bindBtn('fireBtn','fire');
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
function initStage(si,kLives,kScore){
  stageIdx=si;const st=STAGES[si];
  cameraX=0;timeLeft=120;
  if(!kScore)score=0;if(!kLives)lives=3;
  powered=false;fireballs=[];enemyBeams=[];particles=[];
  coins=st.coins.map(([x,y])=>({x,y,r:9,got:false}));
  enemies=st.enemyDefs.map(d=>{
    const base={
      x:d.x,y:d.y,w:d.type==='hamster'?110:44,h:d.type==='hamster'?110:44,
      vx:d.type==='flyRaven'?1.4:-1.3,
      l:d.l,r:d.r,type:d.type,
      alive:true,stomped:false,stompT:0,wf:0,wt:0,
      hp:d.hp||1,maxHp:d.hp||1,
    };
    if(d.type==='hamster'){base.hitFlash=0;}
    if(d.type==='flyRaven'){
      base.baseY=d.y;base.flyAmp=d.flyAmp||60;base.flySpeed=d.flySpeed||0.025;
      base.flyT=Math.random()*Math.PI*2;base.beamCool=60+Math.random()*80;
      base.laser=0;
    }
    return base;
  });
  powerUp={x:st.powerUpX,y:st.powerUpY,w:28,h:28,collected:false};
  resetPlayer();updateUI();updateStageDots();
  clearInterval(timerID);
  timerID=setInterval(()=>{if(GS!=='playing')return;timeLeft--;document.getElementById('timerEl').textContent=timeLeft;if(timeLeft<=0)killPlayer();},1000);
}

function resetPlayer(){
  player={x:60,y:280,w:46,h:50,vx:0,vy:0,onGround:false,facing:1,
    blink:false,blinkT:0,dead:false,deadT:0,wf:0,wt:0,fireCool:0};
}

function totalCoins(){return coins.length;}
function gotCoins(){return coins.filter(c=>c.got).length;}

function updateUI(){
  document.getElementById('scoreEl').textContent=score;
  document.getElementById('livesEl').textContent=lives;
  document.getElementById('timerEl').textContent=timeLeft;
  document.getElementById('pwrLabel').textContent=powered?'🐲':'🐣';
  const fb=document.getElementById('fireBtn');
  if(powered)fb.classList.add('ready');else fb.classList.remove('ready');
  updateCoinUI();
  updateStageDots();
}

function updateCoinUI(){
  const got=gotCoins(),tot=totalCoins();
  const el=document.getElementById('coinUI');
  document.getElementById('coinEl').textContent=`${got}/${tot}`;
  el.className='ui-block'+(got===tot?' ok':got>=tot*0.8?' ':'');
}

function updateStageDots(){
  for(let i=0;i<3;i++){
    const d=document.getElementById('sd'+i);
    d.className='stDot'+(i<stageIdx?' done':i===stageIdx?' cur':'');
  }
}

// ═══════════════════════════════════════════════════════
//  COLLISION
// ═══════════════════════════════════════════════════════
function hit(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}

// ═══════════════════════════════════════════════════════
//  DRAW: YELLOW CHICK
// ═══════════════════════════════════════════════════════
function drawChick(cx,cy,facing,wf,blinking){
  ctx.save();ctx.translate(cx,cy);if(facing<0)ctx.scale(-1,1);
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.beginPath();ctx.ellipse(0,27,21,6,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FFD600';ctx.strokeStyle='#3E1F00';ctx.lineWidth=3;
  ctx.beginPath();ctx.ellipse(0,8,23,25,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  const wy=Math.sin(wf*0.5)*3;ctx.fillStyle='#FFD600';
  ctx.beginPath();ctx.ellipse(-21,10+wy,10,7,-0.4,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.ellipse(21,10+wy,10,7,0.4,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#FF6B35';ctx.lineWidth=2;const fs=Math.sin(wf*0.8)*4;
  ctx.beginPath();ctx.ellipse(-8,31+fs,7,5,0.2,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.ellipse(8,31-fs,7,5,-0.2,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#FFE000';ctx.strokeStyle='#3E1F00';ctx.lineWidth=3;

// ═══════════════════════════════════════════════════════
//  DRAW: FLYING RAVEN (ST3) with beam
// ═══════════════════════════════════════════════════════
function drawFlyRaven(cx,cy,wf,stomped,firing){
  ctx.save();ctx.translate(cx,cy);
  if(stomped){ctx.scale(1,0.28);ctx.translate(0,32);}
  // wing flap
  const flap=Math.sin(wf*0.55)*12;
  // purple aura glow
  if(!stomped){
    const aura=ctx.createRadialGradient(0,0,5,0,0,36);
    aura.addColorStop(0,'rgba(140,0,220,0.25)');aura.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=aura;ctx.beginPath();ctx.ellipse(0,0,36,36,0,0,Math.PI*2);ctx.fill();
  }
  // wings
  ctx.fillStyle='rgba(30,0,60,0.9)';ctx.strokeStyle='#220044';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-6,-4);ctx.bezierCurveTo(-24,-18-flap,-55,-8-flap,-56,12);ctx.bezierCurveTo(-42,2,-20,6,-6,10);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(6,-4);ctx.bezierCurveTo(24,-18-flap,55,-8-flap,56,12);ctx.bezierCurveTo(42,2,20,6,6,10);ctx.closePath();ctx.fill();ctx.stroke();
  // beam firing effect
  if(!stomped&&firing){
    ctx.save();ctx.globalAlpha=0.8;
    ctx.shadowColor='#cc00ff';ctx.shadowBlur=20;
    ctx.strokeStyle='#ee88ff';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(0,300);ctx.stroke();
    ctx.lineWidth=2;ctx.strokeStyle='#ffffff';
    ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(0,300);ctx.stroke();
    ctx.restore();
  }
  // body
  ctx.fillStyle='#141428';ctx.strokeStyle='#000';ctx.lineWidth=3;
  ctx.beginPath();ctx.ellipse(0,6,22,22,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#141428';
  ctx.beginPath();ctx.ellipse(-20,6,7,10,-0.3,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.ellipse(20,6,7,10,0.3,0,Math.PI*2);ctx.fill();ctx.stroke();
  // feet (dangling)
  ctx.fillStyle='#FF8C00';ctx.strokeStyle='#000';ctx.lineWidth=2;
  ctx.beginPath();ctx.ellipse(-7,30,6,4,0.2,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.ellipse(7,30,6,4,-0.2,0,Math.PI*2);ctx.fill();ctx.stroke();
  // head
  ctx.fillStyle='#141428';ctx.strokeStyle='#000';ctx.lineWidth=3;
  ctx.beginPath();ctx.ellipse(0,-12,20,20,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#0a0a1a';ctx.strokeStyle='#000';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-5,-30);ctx.lineTo(0,-41);ctx.lineTo(5,-29);ctx.closePath();ctx.fill();ctx.stroke();
  // eyes: beam charging glow
  if(!stomped){
    const glowR=firing?12:6;
    ctx.fillStyle='#1e1e3a';
    ctx.beginPath();ctx.ellipse(-10,-14,7,5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(10,-14,7,5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=firing?'#ffffff':'#cc44ff';ctx.shadowColor='#aa00ff';ctx.shadowBlur=glowR;
    ctx.beginPath();ctx.arc(-10,-14,firing?5:4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(10,-14,firing?5:4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  } else {
    ctx.strokeStyle='#444';ctx.lineWidth=2;
    [[-13,-16,-7,-12],[-7,-16,-13,-12],[7,-16,13,-12],[13,-16,7,-12]].forEach(([x1,y1,x2,y2])=>{ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();});
  }
  ctx.fillStyle='#FF8C00';ctx.strokeStyle='#000';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-7,-6);ctx.lineTo(7,-6);ctx.lineTo(4,-1);ctx.lineTo(-4,-1);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#FF8C00';ctx.strokeStyle='#fff';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(-8,8,16,14,3);ctx.fill();ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 11px Georgia';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('L',0,15);
  ctx.restore();
}

  ctx.beginPath();ctx.ellipse(30,-46,10,12,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  // head
  ctx.fillStyle=hf?'#ffbbbb':'#eac888';ctx.strokeStyle='#7a4500';ctx.lineWidth=4;
  ctx.beginPath();ctx.ellipse(0,-26,40,38,0,0,Math.PI*2);ctx.fill();ctx.stroke();
  // eyes (angry)
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(-16,-30,8,6,0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(16,-30,8,6,-0.3,0,Math.PI*2);ctx.fill();

  ctx.beginPath();ctx.moveTo(-24,-36);ctx.lineTo(-10,-34);ctx.stroke();

      ctx.fillStyle=gg;ctx.strokeStyle='#fff';ctx.lineWidth=3;

      ctx.strokeStyle='#fff';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(sx+p.w/2,p.y);ctx.lineTo(sx+p.w/2,p.y-65);ctx.stroke();
      ctx.fillStyle='#e53935';
      ctx.beginPath();ctx.moveTo(sx+p.w/2,p.y-65);ctx.lineTo(sx+p.w/2+32,p.y-54);ctx.lineTo(sx+p.w/2,p.y-43);ctx.closePath();ctx.fill();

      ctx.fillText('GOAL',sx+p.w/2,p.y+22);ctx.fillText(`ST${stageIdx+1}`,sx+p.w/2,p.y+38);

    }

}

// ═══════════════════════════════════════════════════════
//  PARTICLES helper
// ═══════════════════════════════════════════════════════
function spawnParticles(wx,wy,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,spd=1.2+Math.random()*3.5;
    particles.push({x:wx,y:wy,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,r:2+Math.random()*3.5,color:col,life:18+Math.random()*22,maxLife:40});
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}

// ═══════════════════════════════════════════════════════
//  UPDATE PLAYER
// ═══════════════════════════════════════════════════════
function updatePlayer(){
  if(player.dead){player.deadT--;player.vy+=0.55;player.y+=player.vy;if(player.deadT<=0)respawn();return;}
  if(player.blink){player.blinkT--;if(player.blinkT<=0)player.blink=false;}
  if(player.fireCool>0)player.fireCool--;

  const SPD=powered?4.4:3.6,JUMP=powered?-11.5:-10.2,GRAV=powered?0.28:0.46;
  if(inp.left){player.vx=-SPD;player.facing=-1;}
  else if(inp.right){player.vx=SPD;player.facing=1;}
  else player.vx*=0.78;

  if(powered){
    if(inp.jump){
      if(player.onGround){player.vy=JUMP;player.onGround=false;}
      else if(player.vy>-2.5)player.vy-=0.9;
    }
  } else {
    if(jumpEdge&&player.onGround){player.vy=JUMP;player.onGround=false;}
  }
  jumpEdge=false;

  if(powered&&inp.fire&&player.fireCool<=0){spawnPlayerFireball();player.fireCool=16;}
  player.vy=Math.min(player.vy+GRAV,13);
  player.x+=player.vx;player.y+=player.vy;
  if(Math.abs(player.vx)>0.5){player.wt++;if(player.wt>4){player.wf++;player.wt=0;}}

  player.onGround=false;
  for(const p of STAGES[stageIdx].platforms){
    if(p.goal) continue; // goal is handled separately, not a physics wall
    if(!hit(player.x,player.y,player.w,player.h,p.x,p.y,p.w,p.h))continue;
    const ox=Math.min(player.x+player.w,p.x+p.w)-Math.max(player.x,p.x);
    const oy=Math.min(player.y+player.h,p.y+p.h)-Math.max(player.y,p.y);
    if(oy<ox){
      if(player.y+player.h/2<p.y+p.h/2){player.y=p.y-player.h;player.vy=0;player.onGround=true;}
      else{player.y=p.y+p.h;player.vy=2;}
    } else {player.x=player.x<p.x?p.x-player.w:p.x+p.w;player.vx=0;}
  }
  const ww=STAGES[stageIdx].worldW;
  if(player.x<0){player.x=0;player.vx=0;}
  if(player.x+player.w>ww){player.x=ww-player.w;player.vx=0;}
  if(player.y>460)killPlayer();

  // coins
  for(const c of coins){
    if(!c.got&&hit(player.x,player.y,player.w,player.h,c.x-c.r,c.y-c.r,c.r*2,c.r*2)){
      c.got=true;score+=10;spawnParticles(c.x,c.y,'#FFD600',6);
      document.getElementById('scoreEl').textContent=score;updateCoinUI();
    }
  }
  // power-up
  if(powerUp&&!powerUp.collected&&!powered){
    if(hit(player.x,player.y,player.w,player.h,powerUp.x,powerUp.y,powerUp.w,powerUp.h)){
      powerUp.collected=true;powered=true;updateUI();
      score+=300;document.getElementById('scoreEl').textContent=score;
      spawnParticles(powerUp.x+14,powerUp.y+14,'#ff7700',28);
      spawnParticles(powerUp.x+14,powerUp.y+14,'#ffdd00',20);
      showPop('🐲 ドラゴン変身！');
      const fl=document.getElementById('flash');
      fl.style.background='linear-gradient(45deg,#ff8800,#ffdd00)';fl.style.opacity=0.8;setTimeout(()=>fl.style.opacity=0,250);
    }
  }
  // goal — all coins required
  const plats=STAGES[stageIdx].platforms;
  const goal=plats[plats.length-1];
  // Use generous detection zone so physics corrections don't miss it
  const nearGoal=player.x+player.w>goal.x-8&&player.x<goal.x+goal.w+8&&player.y+player.h>goal.y-8&&player.y<goal.y+goal.h+8;
  if(nearGoal&&GS==='playing'){
    if(gotCoins()<totalCoins()){
      if(!player._goalBlocked){
        player._goalBlocked=true;
        showPop(`🔒 コイン全収集が必要！ (${gotCoins()}/${totalCoins()})`);
      }
      // gently push player back
      if(player.x+player.w>goal.x+4){player.x=goal.x-player.w-1;player.vx=0;}
    } else {
      stageClear();
    }
  } else {
    player._goalBlocked=false;
  }
  cameraX=Math.max(0,Math.min(player.x-280,STAGES[stageIdx].worldW-800));
}

// ═══════════════════════════════════════════════════════
//  PLAYER FIREBALLS
// ═══════════════════════════════════════════════════════
function spawnPlayerFireball(){
  const mx=player.x+player.w/2+(player.facing*14),my=player.y+player.h*0.35;
  fireballs.push({x:mx,y:my,vx:player.facing*9,vy:-1.2,r:9,life:50});
  spawnParticles(mx,my,'#ff8800',5);
}
function updateFireballs(){
  for(let i=fireballs.length-1;i>=0;i--){
    const f=fireballs[i];
    f.x+=f.vx;f.y+=f.vy;f.vy+=0.2;f.life--;if(f.r>3)f.r-=0.08;
    for(const p of STAGES[stageIdx].platforms){
      if(hit(f.x-f.r,f.y-f.r,f.r*2,f.r*2,p.x,p.y,p.w,p.h)){f.vy=-Math.abs(f.vy)*0.55;f.life-=6;spawnParticles(f.x,f.y,'#ff6600',3);}
    }
    let hitE=false;
    for(const e of enemies){
      if(!e.alive||e.stomped)continue;
      if(hit(f.x-f.r,f.y-f.r,f.r*2,f.r*2,e.x,e.y,e.w,e.h)){
        if(e.type==='hamster'){
          e.hp--;e.hitFlash=12;
          spawnParticles(e.x+e.w/2,e.y+e.h/2,'#ff4400',10);
          if(e.hp<=0){e.stomped=true;e.stompT=60;score+=500;showPop('💥 +500 ハムスター撃破！');}
          else{score+=50;showPop(`💥 +50 HP残り${e.hp}`);}
          document.getElementById('scoreEl').textContent=score;
        } else {
          e.stomped=true;e.stompT=40;score+=200;showPop('+200 🔥');
          spawnParticles(e.x+e.w/2,e.y+e.h/2,'#ff4400',14);
          document.getElementById('scoreEl').textContent=score;
        }
        hitE=true;f.life=0;break;
      }
    }
    if(f.life<=0||f.x<cameraX-80||f.x>cameraX+880)fireballs.splice(i,1);
  }
}

// ═══════════════════════════════════════════════════════
//  ENEMY BEAMS (flyRaven shoots down)
// ═══════════════════════════════════════════════════════
function updateEnemyBeams(){
  for(let i=enemyBeams.length-1;i>=0;i--){
    const b=enemyBeams[i];b.life--;
    // check player hit
    if(!player.dead&&!player.blink){
      const sx=b.x,sy=b.y,ex=b.x,ey=b.y+b.len;
      const px=player.x+player.w/2,py=player.y+player.h/2;
      if(Math.abs(px-sx)<16&&py>=sy&&py<=ey){
        if(powered){powered=false;updateUI();player.blink=true;player.blinkT=130;spawnParticles(player.x+player.w/2,player.y+player.h/2,'#aa00ff',18);showPop('💨 ビーム！変身解除！');}
        else killPlayer();
      }
    }
    if(b.life<=0)enemyBeams.splice(i,1);
  }
}

// ═══════════════════════════════════════════════════════
//  UPDATE ENEMIES
// ═══════════════════════════════════════════════════════
function updateEnemies(){
  for(const e of enemies){
    if(!e.alive)continue;
    if(e.stomped){e.stompT--;if(e.stompT<=0)e.alive=false;continue;}
    if(e.hitFlash>0)e.hitFlash--;
    e.wt++;if(e.wt>4){e.wf++;e.wt=0;}

    // ── FLYING RAVEN (ST3) ──────────────────────────────
    if(e.type==='flyRaven'){
      e.flyT+=e.flySpeed;
      e.x+=e.vx;
      e.y=e.baseY+Math.sin(e.flyT)*e.flyAmp;
      if(e.x<=e.l){e.x=e.l;e.vx=Math.abs(e.vx);}
      if(e.x+e.w>=e.r){e.x=e.r-e.w;e.vx=-Math.abs(e.vx);}
      // beam cooldown
      e.beamCool--;
      const psx=player.x+player.w/2,esy=e.x+e.w/2;
      // fire beam when roughly above player and in camera view
      if(e.beamCool<=0&&Math.abs((e.x+e.w/2)-psx)<60&&e.y<player.y&&(e.x-cameraX)>-50&&(e.x-cameraX)<850){
        e.beamCool=80+Math.random()*60;
        enemyBeams.push({x:e.x+e.w/2,y:e.y+e.h,len:400,life:30,maxLife:30,firing:true});
        spawnParticles(e.x+e.w/2,e.y+e.h,'#cc00ff',8);
      }
      e.laser=(e.laser||0)+1;
      // player stomp from above
      if(!player.dead&&!player.blink&&hit(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
        const stomping=player.vy>0&&(player.y+player.h)<(e.y+22);
        if(stomping){e.stomped=true;e.stompT=40;player.vy=-7.5;score+=150;showPop('+150 👟');spawnParticles(e.x+e.w/2,e.y,'#aa88ff',10);document.getElementById('scoreEl').textContent=score;}
        else{if(powered){powered=false;updateUI();player.blink=true;player.blinkT=130;spawnParticles(player.x+player.w/2,player.y+player.h/2,'#8800ff',18);showPop('💨 変身解除！');}else killPlayer();}
      }
      continue;
    }

    // ── GIANT HAMSTER (ST2 boss) ────────────────────────
    if(e.type==='hamster'){
      e.x+=e.vx;e.y+=1.5;
      for(const p of STAGES[stageIdx].platforms){
        if(!hit(e.x,e.y,e.w,e.h,p.x,p.y,p.w,p.h))continue;
        const oy=Math.min(e.y+e.h,p.y+p.h)-Math.max(e.y,p.y);
        const ox=Math.min(e.x+e.w,p.x+p.w)-Math.max(e.x,p.x);
        if(oy<ox&&e.y+e.h/2<p.y+p.h/2)e.y=p.y-e.h;
      }
      if(e.x<=e.l){e.x=e.l;e.vx=Math.abs(e.vx)*1.1;}
      if(e.x+e.w>=e.r){e.x=e.r-e.w;e.vx=-Math.abs(e.vx)*1.1;}
      if(!player.dead&&!player.blink&&hit(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
        const stomping=player.vy>0&&(player.y+player.h)<(e.y+25)&&!powered;
        if(stomping){
          // stomping hamster bounces player but does no damage
          player.vy=-8;spawnParticles(player.x+player.w/2,player.y+player.h,'#ffaa00',8);showPop('🐹 硬い！ファイヤーで攻撃！');
        } else {
          if(powered){powered=false;updateUI();player.blink=true;player.blinkT=130;spawnParticles(player.x+player.w/2,player.y+player.h/2,'#ff8800',18);showPop('💨 変身解除！');}
          else killPlayer();
        }
      }
      continue;
    }

    // ── NORMAL RAVEN ────────────────────────────────────
    e.x+=e.vx;e.y+=1.6;e.laser=(e.laser+1)%60;
    for(const p of STAGES[stageIdx].platforms){
      if(!hit(e.x,e.y,e.w,e.h,p.x,p.y,p.w,p.h))continue;
      const oy=Math.min(e.y+e.h,p.y+p.h)-Math.max(e.y,p.y);
      const ox=Math.min(e.x+e.w,p.x+p.w)-Math.max(e.x,p.x);
      if(oy<ox&&e.y+e.h/2<p.y+p.h/2)e.y=p.y-e.h;
    }
    if(e.x<=e.l){e.x=e.l;e.vx=Math.abs(e.vx);}
    if(e.x+e.w>=e.r){e.x=e.r-e.w;e.vx=-Math.abs(e.vx);}
    if(!player.dead&&!player.blink&&hit(player.x,player.y,player.w,player.h,e.x,e.y,e.w,e.h)){
      const stomping=player.vy>0&&(player.y+player.h)<(e.y+22);
      if(stomping){e.stomped=true;e.stompT=40;player.vy=-7.5;score+=100;showPop('+100 👟');spawnParticles(e.x+e.w/2,e.y,'#aaaaff',10);document.getElementById('scoreEl').textContent=score;}
      else{if(powered){powered=false;updateUI();player.blink=true;player.blinkT=130;spawnParticles(player.x+player.w/2,player.y+player.h/2,'#ff8800',18);showPop('💨 変身解除！');}else killPlayer();}
    }
  }
}

// ═══════════════════════════════════════════════════════
//  KILL / RESPAWN
// ═══════════════════════════════════════════════════════
function killPlayer(){
  if(player.blink)return;
  lives--;document.getElementById('livesEl').textContent=lives;
  powered=false;updateUI();
  player.dead=true;player.deadT=85;player.vy=-13;
  spawnParticles(player.x+player.w/2,player.y,'#ffffff',12);
  if(lives<=0)setTimeout(()=>{GS='gameover';showOverlay('💀 ゲームオーバー',`スコア: ${score}`,'もう一度！',()=>startStage(0,false,false));},1500);
}
function respawn(){
  if(lives<=0)return;
  player.dead=false;player.x=60;player.y=280;player.vx=0;player.vy=0;
  player.blink=true;player.blinkT=130;cameraX=0;fireballs=[];enemyBeams=[];
  enemies=STAGES[stageIdx].enemyDefs.map(d=>{
    const base={x:d.x,y:d.y,w:d.type==='hamster'?110:44,h:d.type==='hamster'?110:44,
      vx:d.type==='flyRaven'?1.4:-1.3,l:d.l,r:d.r,type:d.type,
      alive:true,stomped:false,stompT:0,wf:0,wt:0,hp:d.hp||1,maxHp:d.hp||1};
    if(d.type==='hamster')base.hitFlash=0;
    if(d.type==='flyRaven'){base.baseY=d.y;base.flyAmp=d.flyAmp||60;base.flySpeed=d.flySpeed||0.025;base.flyT=Math.random()*Math.PI*2;base.beamCool=60+Math.random()*80;base.laser=0;}
    return base;
  });
}

function stageClear(){
  if(GS!=='playing')return;
  clearInterval(timerID);GS='stageclear';
  const tb=timeLeft*5;score+=tb;document.getElementById('scoreEl').textContent=score;
  const fl=document.getElementById('flash');fl.style.background='#fff';fl.style.opacity=1;setTimeout(()=>fl.style.opacity=0,320);
  const isLast=stageIdx===2;
  setTimeout(()=>{
    if(isLast)showOverlay('🏆 ゲームクリア！',`全ステージ制覇！\nスコア: ${score}\nタイムボーナス: +${tb}`,'もう一度！',()=>startStage(0,false,false));
    else showOverlay(`🎉 Stage ${stageIdx+1} クリア！`,`スコア: ${score}\nタイムボーナス: +${tb}`,`Stage ${stageIdx+2} へ！`,()=>startStage(stageIdx+1,true,true));
  },500);
}

// ═══════════════════════════════════════════════════════
//  OVERLAY
// ═══════════════════════════════════════════════════════
const overlay=document.getElementById('overlay');
function showOverlay(title,msg,btnTxt,cb){
  overlay.innerHTML=`<h1>${title}</h1><p>${msg.replace(/\n/g,'<br>')}</p><button class="ovl-btn" id="goBtn">${btnTxt}</button>`;
  overlay.classList.remove('hidden');
  const btn=document.getElementById('goBtn');
  function go(e){e.preventDefault();cb();}
  btn.addEventListener('touchend',go,{passive:false});btn.addEventListener('click',go);
}
function startStage(si,kLives,kScore){
  overlay.classList.add('hidden');GS='playing';initStage(si,kLives,kScore);
}
const startBtn=document.getElementById('startBtn');
function doStart(e){e.preventDefault();startStage(0,false,false);}
startBtn.addEventListener('touchend',doStart,{passive:false});startBtn.addEventListener('click',doStart);

// ═══════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════
function loop(){
  gFrame++;
  ctx.clearRect(0,0,800,400);
  drawBG();drawPlatforms();drawCoins();drawPowerUp(powerUp);
  drawParticles();drawFireballs();drawEnemyBeams();

  for(const e of enemies){
    if(!e.alive)continue;
    const sx=e.x-cameraX+e.w/2,sy=e.y+e.h/2;
    if(e.type==='hamster'){
      drawHamster(sx,sy,e.wf,e.stomped,e.hp,e.maxHp,e.hitFlash||0,e.w,e.h);
    } else if(e.type==='flyRaven'){
      // check if firing beam this frame
      const firing=enemyBeams.some(b=>Math.abs(b.x-(e.x+e.w/2))<5&&b.life>b.maxLife*0.7);
      drawFlyRaven(sx,sy,e.wf,e.stomped,firing);
    } else {
      drawRaven(sx,sy,e.wf,e.stomped,e.laser||0);
    }
  }

  if(!player.dead){
    const show=!player.blink||Math.floor(player.blinkT/5)%2===0;
    if(show){
      const cx=player.x-cameraX+player.w/2,cy=player.y+player.h/2;
      const bl=player.blink&&Math.floor(Date.now()/100)%2===0;
      if(powered)drawDragon(cx,cy-8,player.facing,player.wf,bl,inp.jump&&!player.onGround);
      else drawChick(cx,cy-5,player.facing,player.wf,bl);
    }
  }

  if(GS==='playing'){
    updatePlayer();updateEnemies();updateFireballs();
    updateEnemyBeams();updateParticles();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
